<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindhica Academy Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #2c3e50 url('https://img.freepik.com/free-vector/wave-liquid-background-abstract-vibrant-poster-web-element_41901-2696.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .image-frame {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .img-wrapper {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0,0,0,0.1);
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .frame-label {
            color: white;
            margin-top: 8px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="color: white; margin-bottom: 20px;">Local Gallery</h2>

    <div class="grid-container">
        <div class="image-frame">
            <div class="img-wrapper"><img src="./image-1.jpg"></div>
            <div class="frame-label">IMAGE-1</div>
        </div>

        <div class="image-frame">
            <div class="img-wrapper"><img src="./image-4.jpg"></div>
            <div class="frame-label">IMAGE-4</div>
        </div>

        <div class="image-frame">
            <div class="img-wrapper"><img src="./image-6.jpg"></div>
            <div class="frame-label">IMAGE-6</div>
        </div>

        <div class="image-frame">
            <div class="img-wrapper"><img src="./image-7.jpg"></div>
            <div class="frame-label">IMAGE-7</div>
        </div>

        <div class="image-frame">
            <div class="img-wrapper"><img src="./image-8.jpg"></div>
            <div class="frame-label">IMAGE-8</div>
        </div>

        <div class="image-frame">
            <div class="img-wrapper"><img src="./image-9.jpg"></div>
            <div class="frame-label">IMAGE-9</div>
        </div>
    </div>

</body>
</html>
