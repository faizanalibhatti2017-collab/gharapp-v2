<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GharApp Mobile - Complete Live Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #f97316; --secondary: #a855f7; --success: #10b981; --danger: #ef4444; --bg: #0b0f1a; --card-bg: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0f1a; margin: 0; color: #f1f5f9; padding-bottom: 80px; }

        .top-bar { background: #111827; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111827; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-btn { color: #94a3b8; background: none; border: none; text-align: center; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { font-size: 22px; display: block; margin-bottom: 4px; }

        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 12px; background: #1e293b; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); color: white; margin-bottom: 12px; font-size: 16px; }
        .btn-action { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: bold; cursor: pointer; }
        .list-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            .no-print, .bottom-nav, .top-bar, .btn-action, .fa-trash { display: none !important; }
            .page { display: block !important; padding: 0 !important; }
            .card { background: white !important; border: 1px solid #eee !important; color: black !important; box-shadow: none !important; margin-bottom: 20px !important; }
            #ledger-body, #utility-body { display: table !important; width: 100% !important; border-collapse: collapse !important; }
            .list-item { display: table-row !important; border: 1px solid #ddd !important; background: white !important; }
        }

        /* Modern 3D Glassmorphism Grid Layout */
        .utility-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(105px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .utility-card { position: relative; border-radius: 15px; padding: 12px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 20px rgba(0,0,0,0.3); overflow: hidden; }
        .ke-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(249, 115, 22, 0.15)); }
        .ssgc-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(168, 85, 247, 0.15)); }
        .mob-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(239, 68, 68, 0.15)); }
        .util-icon { font-size: 24px; margin-bottom: 6px; }
        .ke-icon { color: #f59e0b; }
        .ssgc-icon { color: #3b82f6; }
        .mob-icon { color: #ef4444; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-top: 6px; }
        .status-paid { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
        .status-unpaid { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed; inset:0; background:#0b0f1a; z-index:9999; display:flex; align-items:center; justify-content:center; padding: 20px;">
    <div class="card" style="width:100%; max-width:320px; text-align:center;">
        <h2 style="color:var(--primary)">GharApp Mobile</h2>
        <input type="text" id="l-id" placeholder="Username">
        <input type="password" id="l-pass" placeholder="Password">
        <button onclick="login()" class="btn-action">LOGIN</button>
    </div>
</div>

<div class="top-bar no-print">
    <b id="user-display" style="color:var(--primary);">User</b>
    <div style="display:flex; gap:10px;">
        <select id="sel-month" onchange="renderData(); renderUtilities();" style="width:85px; margin:0; padding:5px;"></select>
        <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-size:18px;"><i class="fa fa-power-off"></i></button>
    </div>
</div>

<div id="tab-dash" class="page active">
    <div class="card" style="text-align:center;">
        <small style="color:#94a3b8">Balance</small>
        <h1 id="t-bal" style="margin:5px 0;">0</h1>
        <div style="display:flex; justify-content:space-around;">
            <div style="color:var(--success);"><small>Income</small><br><b id="t-inc">0</b></div>
            <div style="color:var(--danger);"><small>Expense</small><br><b id="t-exp">0</b></div>
        </div>
    </div>
    
    <div class="card no-print">
        <h4 style="margin:0 0 10px 0;">New Entry</h4>
        <input type="date" id="i-date">
        <input type="text" id="i-desc" placeholder="Detail">
        <input type="number" id="i-amt" placeholder="Amount">
        <select id="i-type">
            <option value="exp">Expense (-)</option>
            <option value="inc">Income (+)</option>
        </select>
        <button class="btn-action" onclick="addEntry()">SAVE</button>
    </div>
    <div id="ledger-body"></div>
</div>

<div id="tab-util" class="page">
    <div class="utility-grid">
        <div class="utility-card ke-card">
            <div class="util-icon ke-icon"><i class="fa fa-bolt"></i></div>
            <div style="font-weight:bold; font-size:13px;">K-Electric</div>
            <div style="font-size:9px; color:#94a3b8; margin-top:2px; white-space:nowrap;">A/C: ...4984761</div>
            <div id="ke-status" class="status-badge status-unpaid">No Data</div>
            <div id="ke-amount" style="font-size:11px; margin-top:5px; color:#94a3b8;">RS. 0</div>
        </div>
        <div class="utility-card ssgc-card">
            <div class="util-icon ssgc-icon"><i class="fa fa-fire-flame-simple"></i></div>
            <div style="font-weight:bold; font-size:13px;">SSGC</div>
            <div style="font-size:9px; color:#94a3b8; margin-top:2px; white-space:nowrap;">Cust: ...7590000</div>
            <div id="ssgc-status" class="status-badge status-unpaid">No Data</div>
            <div id="ssgc-amount" style="font-size:11px; margin-top:5px; color:#94a3b8;">RS. 0</div>
        </div>
        <div class="utility-card mob-card">
            <div class="util-icon mob-icon"><i class="fa fa-mobile-screen-button"></i></div>
            <div style="font-weight:bold; font-size:13px;">Mobilink Bill</div>
            <div style="font-size:9px; color:#94a3b8; margin-top:2px; white-space:nowrap;">03202491025</div>
            <div id="mob-status" class="status-badge status-unpaid">No Data</div>
            <div id="mob-amount" style="font-size:11px; margin-top:5px; color:#94a3b8;">RS. 0</div>
        </div>
    </div>

    <div class="card no-print">
        <h4 style="margin:0 0 10px 0;">Add / Edit Bill Record Manually</h4>
        <input type="date" id="u-date">
        <select id="u-company">
            <option value="K-Electric">K-Electric</option>
            <option value="SSGC">SSGC</option>
            <option value="Mobilink Bill">Mobilink Postpaid (03202491025)</option>
        </select>
        <input type="number" id="u-amt" placeholder="Bill Amount (RS)">
        <select id="u-status">
            <option value="Unpaid">Unpaid (Live Pending)</option>
            <option value="Paid">Paid</option>
        </select>
        <button class="btn-action" onclick="saveUtilityBill()">SAVE BILL RECORD</button>
    </div>

    <h4 style="margin:15px 0 10px 0;">Billing History (Live Gmail Stream)</h4>
    <div id="utility-body"></div>
</div>

<div id="tab-users" class="page">
    <div class="card no-print">
        <h3 id="u-form-title" style="margin-top:0;">User Editor</h3>
        <input type="text" id="u-id" placeholder="User ID">
        <input type="text" id="u-pass" placeholder="Password">
        <select id="u-role">
            <option value="viewer">Viewer</option>
            <option value="editor">Editor</option>
            <option value="admin">Admin</option>
        </select>
        <button class="btn-action" onclick="saveUser()">UPDATE USER</button>
    </div>
    <div id="user-monitor-list"></div>
</div>

<nav class="bottom-nav no-print">
    <button class="nav-btn active" onclick="switchTab('dash', this)"><i class="fa fa-chart-line"></i>Dash</button>
    <button class="nav-btn" onclick="switchTab('util', this)"><i class="fa fa-receipt"></i>Bills Control</button>
    <button id="admin-nav-item" class="nav-btn" style="display:none;" onclick="switchTab('users', this)"><i class="fa fa-users-cog"></i>Users</button>
    <button class="nav-btn" onclick="window.print()"><i class="fa fa-print"></i>Print</button>
</nav>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyD3mKQ8DIgMh6GEm3FV31BfBJ_UeYz6dz0",
      authDomain: "gharapp-c720a.firebaseapp.com",
      databaseURL: "https://gharapp-c720a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "gharapp-c720a",
      storageBucket: "gharapp-c720a.firebasestorage.app",
      messagingSenderId: "900171410782",
      appId: "1:900171410782:web:9d4de47b6cd5b00e3cf3cf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(); 

    // ---- MOBILE NETWORK KEEP-ALIVE STABILIZATION ----
    db.ref(".info/connected").on("value", snap => {
        if (snap.val() === true) console.log("Firebase Live on Mobile Network!");
    });

    let myID = localStorage.getItem('ghUser'), myRole = localStorage.getItem('ghRole'), viewingID = myID;

    function login() {
        const id = document.getElementById('l-id').value.trim().toLowerCase(), ps = document.getElementById('l-pass').value;
        if(id === "admin" && ps === "123") { authDone("admin", "admin"); return; }
        db.ref('users/'+id).once('value', snap => {
            if(snap.exists() && snap.val().pass === ps) authDone(id, snap.val().role);
            else alert("Invalid Details!");
        });
    }
    function authDone(id, role) { localStorage.setItem('ghUser', id); localStorage.setItem('ghRole', role); location.reload(); }

    function startApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('user-display').innerText = myID.toUpperCase();
        if(myRole === 'admin') { 
            document.getElementById('admin-nav-item').style.display = 'block';
            loadMonitor();
        }
        setupDates(); loadData(myID);
    }

    function switchTab(t, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        if(el) el.classList.add('active');
    }

    function loadData(id) {
        viewingID = id;
        db.ref('data/'+id).on('value', snap => { window.currentData = snap.val() || {}; renderData(); });
        
        // Real-Time Listener targeting specific user node for live background stream
        db.ref('utilities/'+id).on('value', snap => { 
            window.utilityData = snap.val() || {}; 
            renderUtilities(); 
        });
    }

    function renderData() {
        const m = parseInt(document.getElementById('sel-month').value);
        const body = document.getElementById('ledger-body'); body.innerHTML = "";
        let ti=0, te=0;
        Object.entries(window.currentData).reverse().forEach(([k, r]) => {
            if(new Date(r.d).getMonth() == m) {
                const a = parseFloat(r.a)||0;
                if(r.t === 'inc') ti += a; else te += a;
                body.innerHTML += `<div class="list-item" style="border-left:4px solid ${r.t==='inc'?'var(--success)':'var(--danger)'}">
                    <div><b>${r.n}</b><br><small>${r.d}</small></div>
                    <div style="text-align:right"><b>RS. ${a.toLocaleString()}</b><br>
                    <i class="fa fa-trash no-print" style="color:red; font-size:12px;" onclick="if(confirm('Delete?')) db.ref('data/${viewingID}/${k}').remove()"></i></div>
                </div>`;
            }
        });
        document.getElementById('t-inc').innerText = ti.toLocaleString();
        document.getElementById('t-exp').innerText = te.toLocaleString();
        document.getElementById('t-bal').innerText = (ti-te).toLocaleString();
    }

    function renderUtilities() {
        const m = parseInt(document.getElementById('sel-month').value);
        const body = document.getElementById('utility-body'); 
        if(!body) return; body.innerHTML = "";
        
        let keStatus = "No Data", ssgcStatus = "No Data", mobStatus = "No Data";
        let keAmt = 0, ssgcAmt = 0, mobAmt = 0;

        Object.entries(window.utilityData || {}).reverse().forEach(([k, r]) => {
            if(new Date(r.d).getMonth() == m) {
                const a = parseFloat(r.a)||0;
                
                // Real-time tracking filter for latest entry
                if (r.c === 'K-Electric' && keStatus === "No Data") { keStatus = r.s; keAmt = a; }
                if (r.c === 'SSGC' && ssgcStatus === "No Data") { ssgcStatus = r.s; ssgcAmt = a; }
                if (r.c === 'Mobilink Bill' && mobStatus === "No Data") { mobStatus = r.s; mobAmt = a; }

                body.innerHTML += `<div class="list-item" style="border-left:4px solid ${r.s==='Paid'?'var(--success)':'var(--danger)'}">
                    <div><b>${r.c}</b> <small>(${r.s})</small><br><small>${r.d}</small></div>
                    <div style="text-align:right"><b>RS. ${a.toLocaleString()}</b><br>
                    <i class="fa fa-trash no-print" style="color:red; font-size:12px;" onclick="if(confirm('Delete Bill?')) db.ref('utilities/${viewingID}/${k}').remove()"></i></div>
                </div>`;
            }
        });

        // 3D Visual Grid Forced Component Refresh
        document.getElementById('ke-status').className = `status-badge ${keStatus === 'Paid' ? 'status-paid' : 'status-unpaid'}`;
        document.getElementById('ke-status').innerText = keStatus;
        document.getElementById('ke-amount').innerText = 'RS. ' + keAmt.toLocaleString();

        document.getElementById('ssgc-status').className = `status-badge ${ssgcStatus === 'Paid' ? 'status-paid' : 'status-unpaid'}`;
        document.getElementById('ssgc-status').innerText = ssgcStatus;
        document.getElementById('ssgc-amount').innerText = 'RS. ' + ssgcAmt.toLocaleString();

        document.getElementById('mob-status').className = `status-badge ${mobStatus === 'Paid' ? 'status-paid' : 'status-unpaid'}`;
        document.getElementById('mob-status').innerText = mobStatus;
        document.getElementById('mob-amount').innerText = 'RS. ' + mobAmt.toLocaleString();
    }

    function saveUtilityBill(automatedData = null) {
        const d = automatedData ? automatedData.d : document.getElementById('u-date').value;
        const c = automatedData ? automatedData.c : document.getElementById('u-company').value;
        const a = automatedData ? automatedData.a : document.getElementById('u-amt').value;
        const s = automatedData ? automatedData.s : document.getElementById('u-status').value;
        
        if(d && a) {
            if(s === 'Paid') {
                Object.entries(window.utilityData || {}).forEach(([k, r]) => {
                    if(r.c === c && new Date(r.d).getMonth() === new Date(d).getMonth() && r.s === 'Unpaid') {
                        db.ref(`utilities/${viewingID}/${k}`).remove();
                    }
                });
                db.ref('data/'+viewingID).push({d, n: c + " Paid", a, t: 'exp'});
            }
            db.ref('utilities/'+viewingID).push({d, c, a, s}).then(() => {
                if(!automatedData) { alert("Record Saved!"); document.getElementById('u-amt').value = ""; }
            });
        }
    }

    function loadMonitor() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-monitor-list'); list.innerHTML = "";
            snap.forEach(c => {
                const uid = c.key, udata = c.val();
                db.ref('data/'+uid).once('value', dSnap => {
                    let ti=0, te=0; dSnap.forEach(e => { const a = parseFloat(e.val().a)||0; if(e.val().t==='inc') ti+=a; else te+=a; });
                    list.innerHTML += `<div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>${uid.toUpperCase()}</b>
                            <div>
                                <i class="fa fa-eye" style="color:var(--success); margin-right:15px;" onclick="loadData('${uid}'); switchTab('dash', document.querySelector('.nav-btn'))"></i>
                                <i class="fa fa-edit" style="color:var(--secondary); margin-right:15px;" onclick="editUser('${uid}','${udata.pass}','${udata.role}')"></i>
                                <i class="fa fa-trash" style="color:var(--danger)" onclick="if(confirm('Delete User?')) db.ref('users/${uid}').remove()"></i>
                            </div>
                        </div>
                        <div style="font-size:12px; margin-top:8px; color:#94a3b8">Role: ${udata.role} | Bal: RS. ${(ti-te).toLocaleString()}</div>
                    </div>`;
                });
            });
        });
    }

    function editUser(id, pass, role) {
        document.getElementById('u-id').value = id; document.getElementById('u-pass').value = pass; document.getElementById('u-role').value = role;
        document.getElementById('u-form-title').innerText = "Edit: " + id.toUpperCase();
    }

    function saveUser() {
        const id = document.getElementById('u-id').value.trim().toLowerCase(), ps = document.getElementById('u-pass').value, rl = document.getElementById('u-role').value;
        if(id && ps) { db.ref('users/'+id).update({pass:ps, role:rl}).then(() => { alert("User Updated!"); }); }
    }

    function addEntry() {
        const d = document.getElementById('i-date').value, n = document.getElementById('i-desc').value, a = document.getElementById('i-amt').value, t = document.getElementById('i-type').value;
        if(d && n && a) { db.ref('data/'+viewingID).push({d, n, a, t}); }
    }

    function setupDates() {
        const n = new Date(); document.getElementById('i-date').valueAsDate = n; document.getElementById('u-date').valueAsDate = n;
        const ms = document.getElementById('sel-month');
        ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].forEach((m, i) => ms.add(new Option(m, i, i==n.getMonth(), i==n.getMonth())));
    }

    function logout() { localStorage.clear(); location.reload(); }
    if(myID) startApp();
</script>
</body>
</html>
